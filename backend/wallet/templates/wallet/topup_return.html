<!DOCTYPE html>
{# JazzCash POSTs the browser to this URL after Hosted Checkout. The
   Flutter webview's NavigationDelegate detects the URL match and pops
   the webview — this HTML is just a graceful fallback if the FE is
   slow to react. #}
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>{{ heading }}</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 24px;
           display: flex; flex-direction: column; align-items: center; justify-content: center;
           min-height: 100vh; background: #f5f7fa; color: #0051AE; text-align: center; }
    h1 { font-size: 18px; margin: 0 0 12px; }
    p { font-size: 14px; color: #4b5563; margin: 0; }
  </style>
</head>
<body>
  <h1>{{ heading }}</h1>
  <p>{{ body }}</p>
  <script>
    // Best-effort close hint for webviews that honour window.close from
    // same-origin documents.
    setTimeout(function () { try { window.close(); } catch (e) {} }, 1200);
  </script>
</body>
</html>
